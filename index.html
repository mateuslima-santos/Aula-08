<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cálculo Genial</title>
</head>
<body>
    <header id="cabecalho">
        <div>
            <span id="titulo"><b>Cálculo G3N!41</b></span>
            <br>
            <b>Faça os cálculos mais rápidos do planeta.</b>
        </div>
    </header>

    <main id="secao">
        <section id="calculadora">
            <div id="inputs">
                <input id="input_1" type="text" placeholder="Primeiro valor" aria-label="Primeiro valor">
                <b id="sinal">+</b>
                <input id="input_2" type="text" placeholder="Segundo valor" aria-label="Segundo valor">
                <button id="igual" type="button" aria-label="Calcular"><b>=</b></button>
                <b id="resultado">?</b>
            </div>

            <p id="mensagem" aria-live="polite"></p>

            <div id="botoes">
                <button id="somar" class="botao" type="button" data-operacao="+">Soma</button>
                <button id="subtrair" class="botao" type="button" data-operacao="-">Subtração</button>
                <button id="multiplicar" class="botao" type="button" data-operacao="*">Multiplicação</button>
                <button id="dividir" class="botao" type="button" data-operacao="/">Divisão</button>
                <button id="limpar" class="botao secundario" type="button">Limpar</button>
            </div>
        </section>

        <section id="historico_box">
            <h2>Histórico</h2>
            <ul id="historico">
                <li>Nenhuma operação realizada ainda.</li>
            </ul>
        </section>
    </main>

    <script src="scripts/calculadora.js"></script>
</body>
</html>
